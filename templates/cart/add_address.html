{% extends 'cart/base.html' %}

{% block title %}Add Address - ShopCart{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">📍 Add Delivery Address</h2>

            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <!-- Address Type -->
                        <div class="mb-3">
                            <label class="form-label">Address Type</label>
                            <select name="address_type" class="form-control">
                                <option value="home">Home</option>
                                <option value="office">Office</option>
                            </select>
                        </div>

                        <!-- Street Address -->
                        <div class="mb-3">
                            <label class="form-label">Street Address *</label>
                            <input type="text" name="street_address" class="form-control" required 
                                   placeholder="e.g., 123 Main Street">
                        </div>

                        <!-- Apartment -->
                        <div class="mb-3">
                            <label class="form-label">Apartment/Suite (Optional)</label>
                            <input type="text" name="apartment" class="form-control" 
                                   placeholder="e.g., Apt 4B, Floor 3">
                        </div>

                        <!-- City -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">City *</label>
                                <input type="text" name="city" class="form-control" required 
                                       placeholder="e.g., Mumbai">
                            </div>

                            <!-- State -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">State *</label>
                                <input type="text" name="state" class="form-control" required 
                                       placeholder="e.g., Maharashtra">
                            </div>
                        </div>

                        <!-- ZIP Code -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Zip Code *</label>
                                <input type="text" name="zip_code" class="form-control" required 
                                       placeholder="e.g., 400001">
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number *</label>
                                <input type="tel" name="phone" class="form-control" required 
                                       placeholder="e.g., +91 9876543210">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                ✓ Save Address
                            </button>
                            <a href="{% url 'checkout' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
